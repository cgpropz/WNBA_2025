name: Refresh WNBA data

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      skip_sheets:
        description: 'Set to 1 to skip Google Sheets upload'
        required: false
        default: '0'
  schedule:
    - cron: "0 */3 * * *"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google service account credentials file
        if: ${{ github.event.inputs.skip_sheets != '1' }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > Credentials2.json
          else
            echo 'GOOGLE_SERVICE_ACCOUNT_JSON secret is not configured' >&2
            exit 1
          fi

      - name: Run data refresh
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PYTHONUNBUFFERED: '1'
          SCRAPER_PREFERRED: 'api'
          SKIP_SHEETS: ${{ github.event.inputs.skip_sheets }}
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ github.event.inputs.skip_sheets }}" = "1" ]; then
            echo 'skip_sheets=1: running gamelog.py only'
            python "$GITHUB_WORKSPACE/gamelog.py"
          else
            python "$GITHUB_WORKSPACE/update_all_data.py" --core-only
          fi

      - name: Commit refreshed data
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for file in \
            wnba_boxscores_2025_2026.csv \
            WNBA_Gamelog_Data.csv \
            last_data_refresh.json \
            wnba_bio_2025.csv \
            wnba_guard_dvp.csv \
            wnba_forward_dvp.csv \
            wnba_center_dvp.csv; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done
          if git diff --cached --quiet; then
            echo 'No data changes to commit.'
          else
            git commit -m "chore: refresh WNBA data"
            git push
          fi
